<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Cropper</title>
  <!-- Load CropperJS from CDN -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
  <style>
    #cropper-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 9999;
      display: none;
    }
    #cropper-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 90%;
    }
    #cropper-image {
      max-width: 80vw;
      max-height: 60vh;
    }
    .cropper-buttons {
      text-align: center;
      margin-top: 20px;
    }
    .cropper-button {
      padding: 10px 20px;
      margin: 0 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    #confirm-crop {
      background-color: #4CAF50;
      color: white;
    }
    #cancel-crop {
      background-color: #f44336;
      color: white;
    }
  </style>
</head>
<body>
  <!-- Cropper Modal -->
  <div id="cropper-modal">
    <div id="cropper-container">
      <img id="cropper-image">
      <div class="cropper-buttons">
        <button id="confirm-crop" class="cropper-button">Confirm</button>
        <button id="cancel-crop" class="cropper-button">Cancel</button>
      </div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    let cropper;
    let resolveFunction;
    
    // Initialize cropper when image is selected
    window.startImageCropper = function(imageUrl) {
      return new Promise((resolve) => {
        resolveFunction = resolve;
        const modal = document.getElementById('cropper-modal');
        const image = document.getElementById('cropper-image');
        
        modal.style.display = 'block';
        image.src = imageUrl;
        
        image.onload = function() {
          if (cropper) {
            cropper.destroy();
          }
          
          cropper = new Cropper(image, {
            aspectRatio: 1,  // Square by default
            viewMode: 1,     // Restrict crop box to image size
            autoCropArea: 0.8,
            responsive: true,
            guides: true,
            center: true,
            highlight: true,
            cropBoxMovable: true,
            cropBoxResizable: true
          });
        };
      });
    };
    
    // Confirm crop button handler
    document.getElementById('confirm-crop').addEventListener('click', function() {
      if (cropper) {
        const canvas = cropper.getCroppedCanvas({
          width: 800,  // Output width
          height: 800, // Output height
          minWidth: 256,
          minHeight: 256,
          maxWidth: 4096,
          maxHeight: 4096,
          fillColor: '#fff',
          imageSmoothingEnabled: true,
          imageSmoothingQuality: 'high',
        });
        
        canvas.toBlob(function(blob) {
          const reader = new FileReader();
          reader.onload = function() {
            resolveFunction(reader.result); // Return as data URL
          };
          reader.readAsDataURL(blob);
        }, 'image/jpeg', 0.92); // 0.92 = quality
      }
      closeModal();
    });
    
    // Cancel crop button handler
    document.getElementById('cancel-crop').addEventListener('click', function() {
      resolveFunction(null);
      closeModal();
    });
    
    function closeModal() {
      document.getElementById('cropper-modal').style.display = 'none';
      if (cropper) {
        cropper.destroy();
      }
    }
  </script>
</body>
</html>
